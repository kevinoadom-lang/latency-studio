<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .m { stroke: #111; fill: none; }
    .dot { fill: #111; }
    @media (prefers-color-scheme: dark) {
      .m { stroke: #fff; } .dot { fill: #fff; }
    }
  </style>
  <defs><clipPath id="c"><circle cx="50" cy="50" r="42"/></clipPath></defs>
  <g class="m" clip-path="url(#c)" stroke-width="1.6" stroke-opacity="0.4">
    <line x1="0" y1="29" x2="100" y2="29"/><line x1="0" y1="71" x2="100" y2="71"/>
    <line x1="29" y1="0" x2="29" y2="100"/><line x1="71" y1="0" x2="71" y2="100"/>
  </g>
  <g class="m" clip-path="url(#c)" stroke-width="1.8" stroke-opacity="0.6">
    <line x1="0" y1="50" x2="100" y2="50"/><line x1="50" y1="0" x2="50" y2="100"/>
  </g>
  <circle class="m" cx="50" cy="50" r="42" stroke-width="3" stroke-opacity="0.9"/>
  <g class="m" stroke-width="3" stroke-linecap="round">
    <line x1="44" y1="50" x2="56" y2="50"/><line x1="50" y1="44" x2="50" y2="56"/>
  </g>
  <circle class="dot" cx="50" cy="50" r="2"/>
</svg>
