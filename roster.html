<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Roster — Latency</title>
<style>
  * { box-sizing: border-box; }

  :root { --ink: #111; --muted: #777; --line: rgba(0,0,0,0.12); --bg: #ffffff; --annc-h: 44px; }
  body.annc-off { --annc-h: 0px; }

  html { scroll-behavior: smooth; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { overflow-x: hidden; }
  body.menu-open, body.profile-open { overflow: hidden; }

  /* shared label/wordmark type */
  .label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--ink);
  }

  /* Shared CTA pill (black, white text) */
  .cta-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--ink); color: #fff; text-decoration: none;
    font-size: 12px; letter-spacing: 0.08em; font-weight: 500;
    padding: 8px 16px; border-radius: 999px; white-space: nowrap;
    border: 0; cursor: pointer; font-family: inherit;
    transition: opacity .2s ease;
  }
  .cta-pill:hover { opacity: 0.82; }

  /* Announcement bar */
  .announce {
    display: flex; align-items: center; gap: 16px;
    width: 100%; height: var(--annc-h); padding: 0 16px;
    background: var(--bg); border-bottom: 1px solid var(--line);
    font-size: 12px; letter-spacing: 0.08em; color: var(--muted);
    overflow: hidden;
  }
  .announce__text { flex: 1 1 auto; min-width: 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .announce__cta { flex: 0 0 auto; }
  .announce__close {
    flex: 0 0 auto; width: 30px; height: 30px; margin-right: -6px;
    border: 0; background: none; cursor: pointer; color: var(--muted);
    font-size: 18px; line-height: 1; display: grid; place-items: center;
    transition: color .2s ease;
  }
  .announce__close:hover { color: var(--ink); }
  body.annc-off .announce { display: none; }

  /* Nav */
  .nav {
    position: relative; width: 100%;
    display: flex; align-items: center; justify-content: center;
    height: 64px; padding: 0 20px; z-index: 50;
    background: var(--bg); border-bottom: 1px solid var(--line);
  }
  .nav .wordmark { font-size: 15px; letter-spacing: 0.34em; color: var(--ink); text-decoration: none; }
  .burger {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border: 0; background: none; cursor: pointer;
    display: grid; place-items: center; color: var(--ink);
  }
  .burger span { display: block; width: 22px; height: 1.5px; background: var(--ink); margin: 3px 0; }

  /* Full-screen menu */
  .menu {
    position: fixed; inset: 0; z-index: 60; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; opacity: 0; visibility: hidden; transition: opacity .2s ease, visibility .2s ease;
  }
  .menu.open { opacity: 1; visibility: visible; }
  .menu a {
    font-size: clamp(30px, 8vw, 58px); font-weight: 800; letter-spacing: -0.01em;
    color: var(--ink); text-decoration: none;
  }
  .menu .close {
    position: absolute; top: 18px; right: 18px; width: 42px; height: 42px;
    border: 0; background: none; font-size: 28px; line-height: 1; color: var(--ink); cursor: pointer;
  }

  /* Layout */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
  .eyebrow { display: block; text-align: center; color: var(--muted); }

  /* Page header */
  .rp-main { padding: 84px 24px 120px; }
  .rp-pagehead { margin-bottom: 60px; }
  .rp-sub {
    text-align: center; max-width: 560px; margin: 18px auto 0;
    color: var(--muted); line-height: 1.6; font-size: 16px;
  }

  /* Toggle row */
  .rp-head { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 34px; }
  .rp-toggle { display: inline-flex; gap: 6px; }
  .rp-toggle button {
    min-width: 38px; height: 34px; padding: 0 6px; border-radius: 9px;
    border: 1px solid var(--line); background: none; color: var(--muted);
    font: inherit; font-size: 13px; letter-spacing: 0.04em; cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .rp-toggle button:hover { color: var(--ink); }
  .rp-toggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Grid (column count driven by --cols) */
  .rp-grid { display: grid; grid-template-columns: repeat(var(--cols, 3), 1fr); gap: 28px; }
  .rp-card { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .card-fig { width: 100%; }
  .card-fig .ph { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #f3f3f3; }
  .card-fig .ph img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

  .rp-card .meta { display: flex; align-items: center; gap: 10px; }
  .rp-card .nm { font-weight: 600; }

  /* Tier badges */
  .tier { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; border-radius: 999px; padding: 3px 8px; }
  .tier--sig {                                   /* Signature — premium silver gradient pill */
    background: linear-gradient(135deg, #e8e8e8 0%, #f5f5f5 40%, #c8c8c8 100%);
    border: 0.5px solid rgba(255,255,255,0.8);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.9), 0 1px 3px rgba(0,0,0,0.12);
    color: #333; font-weight: 500;
  }
  .tier--stock { background: none; border: 0.5px solid var(--line); color: var(--muted); font-weight: 400; }

  /* Hover overlay — frosted model card */
  .card-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.75);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
    display: flex; flex-direction: column; justify-content: center;
    padding: 22px; gap: 14px; opacity: 0; transition: opacity 0.28s ease;
  }
  .card-fig:hover .card-overlay, .card-fig:focus-within .card-overlay { opacity: 1; }
  .ov-name { font-weight: 600; font-size: 15px; letter-spacing: 0.04em; color: var(--ink); }
  .ov-spec { margin: 0; display: grid; gap: 7px; }
  .ov-spec > div { display: flex; justify-content: space-between; gap: 12px;
    font-size: 9.5px; letter-spacing: 0.13em; text-transform: uppercase; }
  .ov-spec dt { margin: 0; color: var(--muted); }
  .ov-spec dd { margin: 0; color: var(--ink); text-align: right; }

  /* ===== Character profile interstitial ===== */
  .profile {
    position: fixed; inset: 0; z-index: 120; background: var(--bg);
    opacity: 0; visibility: hidden; transform: translateY(18px);
    transition: opacity .3s ease, transform .3s ease, visibility .3s ease;
  }
  .profile.open { opacity: 1; visibility: visible; transform: translateY(0); }
  .profile__close {
    position: absolute; top: 16px; right: 18px; z-index: 3;
    width: 46px; height: 46px; border: 0; background: none;
    font-size: 30px; line-height: 1; color: var(--ink); cursor: pointer;
  }
  .profile__inner { display: flex; height: 100%; }
  .profile__img { flex: 0 0 50%; background: #f1f1f1; overflow: hidden; }
  .profile__img img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
  .profile__panel {
    flex: 1 1 50%; overflow-y: auto;
    padding: clamp(32px, 5vw, 76px); padding-bottom: 48px;
    display: flex; flex-direction: column; gap: 26px;
  }
  .pf-name { font-size: clamp(34px, 5vw, 56px); font-weight: 800; letter-spacing: -0.02em; margin: 0; }
  .pf-tier-row { margin-top: -12px; }
  .pf-spec { max-width: 400px; }
  .pf-label { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .pf-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .pf-tag { font-size: 11px; letter-spacing: 0.03em; padding: 7px 13px; border-radius: 999px; border: 0.5px solid var(--line); color: var(--ink); }
  .pf-pricing { display: grid; gap: 8px; max-width: 400px; }
  .pf-price-row { display: flex; justify-content: space-between; gap: 16px; font-size: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  .pf-price-row span:first-child { color: var(--muted); }
  .pf-price-row span:last-child { color: var(--ink); font-weight: 500; }
  .pf-avail { font-size: 13px; letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 9px; }
  .pf-avail::before { content: ""; width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .pf-avail.is-available { color: #1a7f37; }
  .pf-avail.is-available::before { background: #1a7f37; }
  .pf-avail.is-booked { color: var(--muted); }
  .pf-avail.is-booked::before { background: #c98a00; }
  .pf-book {
    margin-top: auto; display: inline-block; text-align: center;
    padding: 15px 22px; border-radius: 999px; background: var(--ink);
    color: #fff; text-decoration: none; font-size: 13px; letter-spacing: 0.06em;
  }
  .pf-book:hover { opacity: 0.88; }

  /* Footer */
  .footer { padding: 96px 0 72px; text-align: center; }
  .footer .wordmark { font-size: 14px; letter-spacing: 0.34em; }
  .footer .links { margin-top: 22px; display: flex; gap: 26px; justify-content: center; flex-wrap: wrap; }
  .footer .links a { color: var(--ink); text-decoration: none; }

  @media (prefers-reduced-motion: reduce) {
    .profile { transition: opacity .2s ease, visibility .2s ease; transform: none; }
  }

  /* Mobile */
  @media (max-width: 760px) {
    .rp-main { padding: 56px 20px 90px; }
    .rp-grid { gap: 16px; }
    .profile__inner { flex-direction: column; height: 100%; overflow-y: auto; }
    .profile__img { flex: 0 0 auto; height: 56vh; }
    .profile__panel { flex: 1 1 auto; overflow: visible; padding: 30px 24px calc(40px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
  <!-- ===== Announcement bar ===== -->
  <div class="announce" id="announce" role="region" aria-label="Announcement">
    <span class="announce__text">AI e-comm imagery for DTC brands — no studio, no day rate.</span>
    <a class="cta-pill announce__cta" href="index.html#book">Book your first drop →</a>
    <button class="announce__close" id="anncClose" type="button" aria-label="Dismiss announcement">&times;</button>
  </div>

  <!-- ===== Nav ===== -->
  <header class="nav">
    <a class="wordmark label" href="index.html">LATENCY</a>
    <button class="burger" id="burger" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ===== Full-screen menu ===== -->
  <nav class="menu" id="menu" aria-hidden="true">
    <button class="close" id="menuClose" type="button" aria-label="Close menu">&times;</button>
    <a href="roster.html">Roster</a>
    <a href="index.html#work">Work</a>
    <a href="index.html#how">About</a>
    <a href="index.html#book">Book</a>
  </nav>

  <!-- ===== Roster page ===== -->
  <main class="wrap rp-main">
    <div class="rp-pagehead">
      <span class="eyebrow label">Roster</span>
      <p class="rp-sub">A cast of AI models built for e-commerce. Book a face — or sign one exclusively.</p>
    </div>

    <div class="rp-head">
      <div class="rp-toggle" id="rpToggle" role="group" aria-label="Grid columns">
        <button type="button" data-cols="1" aria-label="One column">1</button>
        <button type="button" data-cols="2" aria-label="Two columns">2</button>
        <button type="button" data-cols="3" class="active" aria-label="Three columns">3</button>
      </div>
    </div>

    <div class="rp-grid" id="rpGrid" style="--cols:3;"><!-- cards injected by JS --></div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="wordmark label">LATENCY</div>
    <div class="links label">
      <a href="roster.html">Roster</a>
      <a href="index.html#work">Work</a>
      <a href="index.html#how">About</a>
      <a href="index.html#book">Book</a>
    </div>
  </footer>

  <!-- ===== Character profile interstitial ===== -->
  <div class="profile" id="profile" role="dialog" aria-modal="true" aria-label="Model profile" aria-hidden="true">
    <button class="profile__close" id="profileClose" type="button" aria-label="Close profile">&times;</button>
    <div class="profile__inner">
      <div class="profile__img"><img id="pfImg" src="" alt="" /></div>
      <div class="profile__panel">
        <h2 class="pf-name" id="pfName"></h2>
        <div class="pf-tier-row"><span class="tier" id="pfTier"></span></div>
        <dl class="ov-spec pf-spec" id="pfSpec"></dl>
        <div>
          <div class="pf-label">Frequently booked for</div>
          <div class="pf-tags" id="pfTags"></div>
        </div>
        <div>
          <div class="pf-label">Pricing</div>
          <div class="pf-pricing" id="pfPricing"></div>
        </div>
        <div class="pf-avail" id="pfAvail"></div>
        <a class="pf-book" id="pfBook" href="index.html#book">Book →</a>
      </div>
    </div>
  </div>

  <script>
    /* ===== Character data ===== */
    var CHARACTERS = {
      aoki: {
        name: "Aoki", src: "processed/Aoki.png", tier: "sig",
        specs: { Height: "5'7\"", Ethnicity: "East Asian", Hair: "Black blunt bob", Eyes: "Dark brown", Build: "Slim narrow frame" },
        tags: ["Streetwear", "Basics", "Accessories", "Japanese-lean editorial"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      },
      eli: {
        name: "Eli", src: "processed/Eli.png", tier: "stock",
        specs: { Height: "6'0\"", Ethnicity: "Mixed heritage", Hair: "Short fade", Eyes: "Dark brown", Build: "Athletic natural" },
        tags: ["Streetwear", "Outerwear", "Accessories", "Menswear"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      },
      hana: {
        name: "Hana", src: "processed/Hana.png", tier: "sig",
        specs: { Height: "5'6\"", Ethnicity: "East Asian", Hair: "Blunt bob", Eyes: "Dark brown", Build: "Slim precise" },
        tags: ["High fashion", "Editorial", "Contemporary", "Japanese brands"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      },
      nadia: {
        name: "Nadia", src: "processed/Nadia.png", tier: "sig",
        specs: { Height: "5'8\"", Ethnicity: "Italian/Algerian", Hair: "Dark brown", Eyes: "Dark brown", Build: "Tall lean" },
        tags: ["Elevated basics", "Outerwear", "Jewellery", "Lifestyle"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      },
      ade: {
        name: "Ade", src: "processed/Ade.png", tier: "sig",
        specs: { Height: "6'1\"", Ethnicity: "Black American", Hair: "Thick mature locs", Eyes: "Dark brown", Build: "Lean athletic" },
        tags: ["High fashion", "Streetwear", "Editorial", "Campaign"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      },
      caspar: {
        name: "Caspar", src: "processed/Caspar.png", tier: "stock",
        specs: { Height: "6'2\"", Ethnicity: "Scandinavian", Hair: "Buzz cut dark brown", Eyes: "Blue-grey", Build: "Tall lean" },
        tags: ["Technical outerwear", "Contemporary menswear", "Scandinavian brands", "Lifestyle"],
        priceStock: "From £600 / drop", priceSig: "From £1,500 / season"
      }
    };
    var ORDER = ["aoki", "eli", "hana", "nadia", "ade", "caspar"];

    function tierLabel(t) { return t === "sig" ? "Signature" : "Essential"; }
    function tierClass(t) { return t === "sig" ? "tier--sig" : "tier--stock"; }

    function specRows(specs) {
      var html = "";
      for (var k in specs) { if (specs.hasOwnProperty(k)) {
        html += "<div><dt>" + k + "</dt><dd>" + specs[k] + "</dd></div>";
      }}
      return html;
    }

    /* ===== Build the grid ===== */
    (function () {
      var grid = document.getElementById("rpGrid");
      var html = "";
      ORDER.forEach(function (key) {
        var c = CHARACTERS[key];
        html +=
          '<article class="rp-card">' +
            '<div class="card-fig" tabindex="0">' +
              '<div class="ph">' +
                '<img src="' + c.src + '" alt="' + c.name + '" />' +
                '<div class="card-overlay">' +
                  '<div class="ov-name">' + c.name + '</div>' +
                  '<dl class="ov-spec">' + specRows(c.specs) +
                    '<div><dt>Tier</dt><dd>' + tierLabel(c.tier) + '</dd></div>' +
                    '<div><dt>Status</dt><dd>' + (c.tier === "sig" ? "1 slot open" : "Available") + '</dd></div>' +
                  '</dl>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="meta"><span class="nm">' + c.name + '</span>' +
              '<span class="tier ' + tierClass(c.tier) + '">' + tierLabel(c.tier) + '</span></div>' +
            '<button class="cta-pill rp-preview" type="button" data-char="' + key + '">Preview model →</button>' +
          '</article>';
      });
      grid.innerHTML = html;
    })();

    /* ===== Column toggle (persists on the page + across visits) ===== */
    (function () {
      var grid = document.getElementById("rpGrid");
      var toggle = document.getElementById("rpToggle");
      var buttons = toggle.querySelectorAll("button");
      var saved = null;
      try { saved = localStorage.getItem("rosterCols"); } catch (e) {}
      if (saved === "1" || saved === "2" || saved === "3") setCols(saved);

      function setCols(n) {
        grid.style.setProperty("--cols", n);
        buttons.forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-cols") === n); });
        try { localStorage.setItem("rosterCols", n); } catch (e) {}
      }
      buttons.forEach(function (b) {
        b.addEventListener("click", function () { setCols(b.getAttribute("data-cols")); });
      });
    })();

    /* ===== Profile interstitial ===== */
    (function () {
      var profile = document.getElementById("profile");
      var pfImg = document.getElementById("pfImg");
      var pfName = document.getElementById("pfName");
      var pfTier = document.getElementById("pfTier");
      var pfSpec = document.getElementById("pfSpec");
      var pfTags = document.getElementById("pfTags");
      var pfPricing = document.getElementById("pfPricing");
      var pfAvail = document.getElementById("pfAvail");
      var pfBook = document.getElementById("pfBook");
      var pfClose = document.getElementById("profileClose");
      var lastFocus = null;

      function open(key) {
        var c = CHARACTERS[key];
        if (!c) return;
        lastFocus = document.activeElement;
        pfImg.src = c.src; pfImg.alt = c.name;
        pfName.textContent = c.name;
        pfTier.textContent = tierLabel(c.tier);
        pfTier.className = "tier " + tierClass(c.tier);
        pfSpec.innerHTML = specRows(c.specs);
        pfTags.innerHTML = c.tags.map(function (t) { return '<span class="pf-tag">' + t + '</span>'; }).join("");
        pfPricing.innerHTML =
          '<div class="pf-price-row"><span>Essential</span><span>' + c.priceStock + '</span></div>' +
          '<div class="pf-price-row"><span>Signature</span><span>' + c.priceSig + '</span></div>';
        if (c.tier === "sig") {
          pfAvail.className = "pf-avail is-booked";
          pfAvail.textContent = "Booked — 1 slot open";
        } else {
          pfAvail.className = "pf-avail is-available";
          pfAvail.textContent = "Available";
        }
        pfBook.textContent = "Book " + c.name + " →";
        pfBook.href = "index.html#book";

        profile.classList.add("open");
        profile.setAttribute("aria-hidden", "false");
        document.body.classList.add("profile-open");
        pfClose.focus();
      }

      function close() {
        profile.classList.remove("open");
        profile.setAttribute("aria-hidden", "true");
        document.body.classList.remove("profile-open");
        if (lastFocus && lastFocus.focus) lastFocus.focus();
      }

      document.getElementById("rpGrid").addEventListener("click", function (e) {
        var btn = e.target.closest(".rp-preview");
        if (btn) open(btn.getAttribute("data-char"));
      });
      pfClose.addEventListener("click", close);
      profile.addEventListener("click", function (e) { if (e.target === profile || e.target.classList.contains("profile__inner")) close(); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && profile.classList.contains("open")) close();
      });
    })();

    /* ===== Announcement dismiss ===== */
    (function () {
      var anncClose = document.getElementById("anncClose");
      if (sessionStorage.getItem("anncDismissed") === "1") document.body.classList.add("annc-off");
      anncClose.addEventListener("click", function () {
        document.body.classList.add("annc-off");
        try { sessionStorage.setItem("anncDismissed", "1"); } catch (e) {}
      });
    })();

    /* ===== Burger menu ===== */
    (function () {
      var burger = document.getElementById("burger");
      var menu = document.getElementById("menu");
      var close = document.getElementById("menuClose");
      function setOpen(on) {
        menu.classList.toggle("open", on);
        document.body.classList.toggle("menu-open", on);
        menu.setAttribute("aria-hidden", on ? "false" : "true");
        burger.setAttribute("aria-expanded", on ? "true" : "false");
      }
      burger.addEventListener("click", function () { setOpen(!menu.classList.contains("open")); });
      close.addEventListener("click", function () { setOpen(false); });
      menu.querySelectorAll("a").forEach(function (a) { a.addEventListener("click", function () { setOpen(false); }); });
      document.addEventListener("keydown", function (e) { if (e.key === "Escape") setOpen(false); });
    })();
  </script>
</body>
</html>
